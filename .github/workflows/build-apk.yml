name: Build APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Flutter APK bauen
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Abhängigkeiten installieren
        working-directory: android-app
        run: flutter pub get

      - name: APK bauen
        working-directory: android-app
        run: flutter build apk --release

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: notenleser-apk
          path: android-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
