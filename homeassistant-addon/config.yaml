name: Notenleser
version: "0.1.0"
slug: notenleser
description: >
  Scanne Notenblätter und spiele die Melodie ab.
  Baut automatisch eine Bibliothek aller erfassten Lieder auf.
url: https://github.com/nilsgollub/notenleser
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8000
panel_icon: mdi:music-note
panel_title: Notenleser
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: API und Web-Oberfläche
map:
  - addon_config:rw
options:
  omr_engine: mock
schema:
  omr_engine: str
